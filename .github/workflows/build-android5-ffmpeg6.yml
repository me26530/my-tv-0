name: Build Android 5 APK with Media3 1.8.0 and FFmpeg 6.0

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout my-tv-0
        uses: actions/checkout@v4
        with:
          ref: main
          path: my-tv-0

      - name: Checkout AndroidX Media 1.8.0
        uses: actions/checkout@v4
        with:
          repository: androidx/media
          ref: 1.8.0
          path: media

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Linux build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            build-essential \
            git \
            libtool \
            pkg-config \
            yasm \
            nasm \
            unzip \
            zip

      - name: Install Android NDK r26b
        run: |
          sdkmanager "ndk;26.1.10909125"

      - name: Update Media3 version to 1.8.0
        run: |
          set -euxo pipefail

          cd my-tv-0

          echo "Before:"
          grep 'media3 =' gradle/libs.versions.toml || true

          sed -i 's/media3 = ".*"/media3 = "1.8.0"/' gradle/libs.versions.toml

          echo "After:"
          grep 'media3 =' gradle/libs.versions.toml

      - name: Build FFmpeg 6.0 native libraries
        run: |
          set -euxo pipefail

          cd media

          export FFMPEG_MODULE_PATH="$(pwd)/libraries/decoder_ffmpeg/src/main"
          export NDK_PATH="$ANDROID_HOME/ndk/26.1.10909125"
          export HOST_PLATFORM="linux-x86_64"
          export ANDROID_ABI=21

          echo "FFMPEG_MODULE_PATH=${FFMPEG_MODULE_PATH}"
          echo "NDK_PATH=${NDK_PATH}"
          echo "HOST_PLATFORM=${HOST_PLATFORM}"
          echo "ANDROID_ABI=${ANDROID_ABI}"

          cd "${FFMPEG_MODULE_PATH}/jni"

          if [ ! -d ffmpeg ]; then
            git clone https://git.ffmpeg.org/ffmpeg.git
          fi

          cd ffmpeg
          git fetch --all --tags
          git checkout release/6.0
          cd ..

          {
            ./build_ffmpeg.sh \
              "${FFMPEG_MODULE_PATH}" \
              "${NDK_PATH}" \
              "${HOST_PLATFORM}" \
              "${ANDROID_ABI}" \
              aac ac3 eac3 mp2 mp3 flac opus vorbis
          } 2>&1 | tee /tmp/ffmpeg-build.log

      - name: Upload FFmpeg build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-build-log
          path: /tmp/ffmpeg-build.log

      - name: Build Media3 FFmpeg decoder AAR
        run: |
          set -euxo pipefail

          cd media
          chmod +x ./gradlew

          ./gradlew :lib-decoder-ffmpeg:assembleRelease --stacktrace

      - name: Patch FFmpeg AAR minSdk to 21
        run: |
          set -euxo pipefail

          AAR_FILE=$(find media -name "lib-decoder-ffmpeg-release.aar" -type f | head -n 1)

          if [ -z "${AAR_FILE}" ]; then
            echo "FFmpeg AAR not found"
            exit 1
          fi

          AAR_FILE="$(realpath "${AAR_FILE}")"

          echo "Patch AAR: ${AAR_FILE}"

          WORK_DIR="/tmp/ffmpeg-aar-patch"
          PATCHED_AAR="/tmp/lib-decoder-ffmpeg-release-patched.aar"

          rm -rf "${WORK_DIR}"
          rm -f "${PATCHED_AAR}"

          mkdir -p "${WORK_DIR}"

          unzip -q "${AAR_FILE}" -d "${WORK_DIR}"

          echo "Before patch AndroidManifest.xml:"
          cat "${WORK_DIR}/AndroidManifest.xml"

          sed -i 's/android:minSdkVersion="23"/android:minSdkVersion="21"/g' "${WORK_DIR}/AndroidManifest.xml"
          sed -i 's/minSdkVersion="23"/minSdkVersion="21"/g' "${WORK_DIR}/AndroidManifest.xml"

          echo "After patch AndroidManifest.xml:"
          cat "${WORK_DIR}/AndroidManifest.xml"

          cd "${WORK_DIR}"
          zip -qr "${PATCHED_AAR}" .

          cp "${PATCHED_AAR}" "${AAR_FILE}"

          echo "Patched AAR saved: ${AAR_FILE}"

          unzip -p "${AAR_FILE}" AndroidManifest.xml

      - name: Replace my-tv-0 FFmpeg AAR
        run: |
          set -euxo pipefail

          mkdir -p my-tv-0/app/libs

          echo "Search generated AAR files:"
          find media -name "*.aar" -type f

          AAR_FILE=$(find media -name "lib-decoder-ffmpeg-release.aar" -type f | head -n 1)

          if [ -z "${AAR_FILE}" ]; then
            echo "FFmpeg AAR not found"
            exit 1
          fi

          echo "Found AAR: ${AAR_FILE}"

          cp "${AAR_FILE}" my-tv-0/app/libs/lib-decoder-ffmpeg-release.aar

          echo "Current app/libs:"
          ls -lh my-tv-0/app/libs/

      - name: Show dependency insight for OkHttp
        run: |
          set -euxo pipefail

          cd my-tv-0
          chmod +x ./gradlew

          ./gradlew :app:dependencyInsight \
            --dependency okhttp \
            --configuration releaseRuntimeClasspath || true

      - name: Build my-tv-0 release APK
        run: |
          set -euxo pipefail

          cd my-tv-0
          chmod +x ./gradlew

          ./gradlew clean assembleRelease --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-tv-0-android5-media3-1.8.0-ffmpeg6-apk
          path: my-tv-0/app/build/outputs/apk/release/*.apk

      - name: Upload FFmpeg AAR
        uses: actions/upload-artifact@v4
        with:
          name: lib-decoder-ffmpeg-release-aar
          path: my-tv-0/app/libs/lib-decoder-ffmpeg-release.aar
